<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>SEACE Chat | Sin conexion</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(15, 23, 42, 0.08), transparent 45%),
          #f8fafc;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        padding: 28px 24px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
        padding: 8px 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 26px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        min-height: 48px;
        padding: 0 18px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">SEACE</span>
      <h1>Sin conexion</h1>
      <p>
        La app esta instalada, pero en este momento no hay red disponible para cargar informacion
        de SEACE. Cuando recuperes conexion, vuelve a intentarlo.
      </p>
      <a href="/chat">Reintentar</a>
    </main>
  </body>
</html>
